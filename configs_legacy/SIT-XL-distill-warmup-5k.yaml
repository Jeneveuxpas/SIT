# iREPA + Attention Scaffolding with soft Stage-2 distillation warmup
# Usage:
#   ./launch.sh --config configs/SIT-XL-distill-warmup-5k.yaml \
#     --exp-name SIT-XL-distill-warmup-5k --gpu 4,5,6,7 --num-gpus 4

# ============================================================================
# Model Configuration
# ============================================================================
model: SiT-XL/2-EncoderKV
num-classes: 1000
encoder-depth: 10
fused-attn: true
qk-norm: false
projection-layer-type: mlp
proj-kwargs-kernel-size: 3

# ============================================================================
# Encoder KV Configuration
# ============================================================================
enc-type: dinov2-b
enc-layer-indices: "12"     # Encoder layer for K/V extraction (1-based)
sit-layer-indices: "4"     # SiT layer for K/V injection (1-based)
stage1-steps: 30000
transition-steps: 0        # Keep attention handoff as hard switch for this ablation
distill-coeff: 2.0
distill-warmup-steps: 5000
distill-warmup-schedule: linear

# Alignment mode: logits, attn_mse, kv_mse
align-mode: attn_mse

# K/V projection: linear, mlp, conv
kv-proj-type: linear
kv-proj-kernel-size: 1
kv-norm-type: none
kv-zscore-alpha: 1.0

# ============================================================================
# REPA Loss Configuration
# ============================================================================
repa-loss: true
proj-coeff: "1.0"
projection-loss-type: cosine_repa
spnorm-method: zscore
zscore-alpha: 0.6

# ============================================================================
# Dataset
# ============================================================================
data-dir: /dev/shm/data
resolution: 256
batch-size: 256

# ============================================================================
# Training
# ============================================================================
epochs: 1400
max-train-steps: 100000
checkpointing-steps: 50000
sampling-steps: 100000
gradient-accumulation-steps: 1
learning-rate: 1e-4
adam-beta1: 0.9
adam-beta2: 0.999
adam-weight-decay: 0.0
adam-epsilon: 1e-8
max-grad-norm: 1.0
ema-decay: 0.9999
ema-update-freq: 1

# ============================================================================
# Precision & Performance
# ============================================================================
allow-tf32: true
mixed-precision: fp16
compile: true

# ============================================================================
# Misc
# ============================================================================
seed: 0
num-workers: 12
cfg-prob: 0.1
path-type: linear
prediction: v
n-samples: 256
