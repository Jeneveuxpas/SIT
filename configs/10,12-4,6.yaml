# iREPA with Encoder KV Distillation - 2-layer KV variant
# Based on configs/kv_coeff-4.0.yaml (only layer indices changed)

# ============================================================================
# Model Configuration
# ============================================================================
model: SiT-XL/2-EncoderKV
num-classes: 1000
encoder-depth: 10
fused-attn: true
qk-norm: false
projection-layer-type: conv
proj-kwargs-kernel-size: 1

# ============================================================================
# Encoder KV Configuration
# ============================================================================
enc-type: dinov2-b
enc-layer-indices: "10,12"     # Encoder layers for K/V extraction (1-based)
sit-layer-indices: "4,6"       # SiT layers for K/V injection (1-based)
stage1-steps: 30000
distill-coeff: 4.0

# Alignment mode: logits, attn_mse, kv_mse
align-mode: attn_mse

# K/V projection: linear, mlp, conv
kv-proj-type: linear
kv-proj-kernel-size: 1
kv-norm-type: none
kv-zscore-alpha: 1.0

# ============================================================================
# REPA Loss Configuration
# ============================================================================
repa-loss: true
proj-coeff: "1.0"
projection-loss-type: mse_v_norm
spnorm-method: zscore
zscore-alpha: 0.6

# ============================================================================
# Dataset
# ============================================================================
data-dir: /dev/shm/data
resolution: 256
batch-size: 256

# ============================================================================
# Training
# ============================================================================
epochs: 1400
max-train-steps: 100000
checkpointing-steps: 100000
sampling-steps: 100000
gradient-accumulation-steps: 1
learning-rate: 1e-4
adam-beta1: 0.9
adam-beta2: 0.999
adam-weight-decay: 0.0
adam-epsilon: 1e-8
max-grad-norm: 1.0
ema-decay: 0.9999
ema-update-freq: 1

# ============================================================================
# Precision & Performance
# ============================================================================
allow-tf32: true
mixed-precision: fp16
compile: true

# ============================================================================
# Misc
# ============================================================================
seed: 0
num-workers: 12
cfg-prob: 0.1
path-type: linear
prediction: v
n-samples: 256
