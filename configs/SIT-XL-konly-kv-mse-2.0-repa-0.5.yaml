# Component ablation: K-only direct component distillation.
# Based on SIT-XL-kv-2.0-repa-0.5.yaml.

# ============================================================================
# Model Configuration
# ============================================================================
model: SiT-XL/2-EncoderKV
num-classes: 1000
encoder-depth: 10
fused-attn: true
qk-norm: false
projection-layer-type: conv
proj-kwargs-kernel-size: 3

# ============================================================================
# Encoder KV Configuration
# ============================================================================
enc-type: dinov2-b
enc-layer-indices: "12"
sit-layer-indices: "4"
stage1-steps: 30000
distill-coeff: 2.0

# Direct component MSE instead of attention-output distillation.
align-mode: kv_mse

kv-proj-type: linear
kv-proj-kernel-size: 1
kv-norm-type: none
kv-zscore-alpha: 1.0
kv-replace-mode: k

# ============================================================================
# REPA Loss Configuration
# ============================================================================
repa-loss: true
proj-coeff: "0.5"
projection-loss-type: cosine_v
spnorm-method: zscore
zscore-alpha: 0.6

# ============================================================================
# Dataset
# ============================================================================
data-dir: /dev/shm/data
resolution: 256
batch-size: 256

# ============================================================================
# Training
# ============================================================================
epochs: 1400
max-train-steps: 100000
checkpointing-steps: 100000
sampling-steps: 100000
gradient-accumulation-steps: 1
learning-rate: 1e-4
adam-beta1: 0.9
adam-beta2: 0.999
adam-weight-decay: 0.0
adam-epsilon: 1e-8
max-grad-norm: 1.0
ema-decay: 0.9999
ema-update-freq: 1

# ============================================================================
# Precision & Performance
# ============================================================================
allow-tf32: true
mixed-precision: fp16
compile: true

# ============================================================================
# Misc
# ============================================================================
seed: 0
num-workers: 12
cfg-prob: 0.1
path-type: linear
prediction: v
n-samples: 256
