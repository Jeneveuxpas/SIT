# iREPA with MAE Encoder KV Distillation - Default Configuration
# Usage: python train.py --config configs/SIT-XL-MAE-kv-2.0-repa-0.25.yaml --exp-name mae-l-kv-2.0-repa-0.25
#
# Requires local checkpoint:
#   pretrained_models/mae_vitl.pth

# ============================================================================
# Model Configuration
# ============================================================================
model: SiT-XL/2-EncoderKV
num-classes: 1000
encoder-depth: 10
fused-attn: true
qk-norm: false
projection-layer-type: conv
proj-kwargs-kernel-size: 3

# ============================================================================
# Encoder KV Configuration
# ============================================================================
enc-type: mae-l
enc-layer-indices: "24"     # MAE-L encoder layer for Q/K/V extraction (1-based)
sit-layer-indices: "4"      # SiT layer for Q/K/V injection (1-based)
stage1-steps: 30000         # Number of steps for Stage 1
transition-steps: 0         # Set to 5000 to enable final-Stage-1 cosine handoff
distill-coeff: 2.0          # Coefficient for attention distillation loss

# Alignment mode: attn_mse, kv_mse
align-mode: attn_mse

# K/V projection: linear, mlp, conv
kv-proj-type: linear
kv-proj-kernel-size: 1
kv-norm-type: none          # none, layernorm, rmsnorm, zscore, zscore_token, batchnorm
kv-zscore-alpha: 1.0

# ============================================================================
# REPA Loss Configuration
# ============================================================================
repa-loss: true
proj-coeff: "0.25"
projection-loss-type: cosine_v    # cosine, mse, mse_v, mse_noisy
spnorm-method: zscore             # none, zscore, zscore_token, layernorm
zscore-alpha: 0.6

# ============================================================================
# Dataset
# ============================================================================
data-dir: /dev/shm/data
resolution: 256
batch-size: 256

# ============================================================================
# Training
# ============================================================================
epochs: 1400
max-train-steps: 100000
checkpointing-steps: 10000
sampling-steps: 100000
gradient-accumulation-steps: 1
learning-rate: 1e-4
adam-beta1: 0.9
adam-beta2: 0.999
adam-weight-decay: 0.0
adam-epsilon: 1e-8
max-grad-norm: 1.0
ema-decay: 0.9999
ema-update-freq: 1

# ============================================================================
# Precision & Performance
# ============================================================================
allow-tf32: true
mixed-precision: fp16
compile: true

# ============================================================================
# Misc
# ============================================================================
seed: 0
num-workers: 12
cfg-prob: 0.1
path-type: linear
prediction: v
n-samples: 256
