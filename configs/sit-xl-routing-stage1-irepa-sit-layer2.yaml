# Stage1 attention-routing warmup + iREPA.
# SiT target layer ablation: inject encoder K/V into SiT layer 2.
# No Stage 2 distillation; after 30k, training continues with native SiT attention.
# Usage: python train.py --config configs/sit-xl-routing-stage1-irepa-sit-layer2.yaml --exp-name sit-xl-routing-stage1-irepa-sit-layer2

# Model
model: SiT-XL/2-EncoderKV
num-classes: 1000
encoder-depth: 10
fused-attn: true
qk-norm: false
projection-layer-type: conv
proj-kwargs-kernel-size: 3

# Encoder KV warmup
use-kv: true
enc-type: dinov2-b
enc-layer-indices: "12"
sit-layer-indices: "2"
stage1-steps: 30000
transition-steps: 0
align-mode: attn_mse
distill-coeff: 0.0
kv-stop-step: 30000
kv-stop-fade-steps: 0
kv-proj-type: linear
kv-proj-kernel-size: 1
kv-norm-type: none
kv-zscore-alpha: 1.0

# iREPA clean-feature alignment
repa-loss: true
proj-coeff: "1.0"
projection-loss-type: cosine
spnorm-method: zscore
zscore-alpha: 0.6

# Dataset
data-dir: /dev/shm/data
resolution: 256
batch-size: 256

# Training
epochs: 1400
max-train-steps: 100000
checkpointing-steps: 100000
sampling-steps: 100000
gradient-accumulation-steps: 1
learning-rate: 1e-4
adam-beta1: 0.9
adam-beta2: 0.999
adam-weight-decay: 0.0
adam-epsilon: 1e-8
max-grad-norm: 1.0
ema-decay: 0.9999
ema-update-freq: 1

# Precision
allow-tf32: true
mixed-precision: fp16
compile: true

# Misc
seed: 0
num-workers: 12
cfg-prob: 0.1
path-type: linear
prediction: v
n-samples: 256
