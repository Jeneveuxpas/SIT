# Pure REPA (no KV distillation, no 2-stage)
# Usage: ./launch.sh --config configs/repa_only.yaml --exp-name repa_only

# ============================================================================
# Model Configuration
# ============================================================================
model: SiT-XL/2-EncoderKV
num-classes: 1000
encoder-depth: 10
fused-attn: true
qk-norm: false
projection-layer-type: conv
proj-kwargs-kernel-size: 1

# ============================================================================
# Disable KV distillation (no 2-stage)
# ============================================================================
use-kv: false
distill-coeff: 0.0
stage1-steps: 0

# ============================================================================
# REPA Loss Configuration (enabled)
# ============================================================================
enc-type: dinov2-b
repa-loss: true
proj-coeff: "1.0"
projection-loss-type: cosine  
spnorm-method: zscore
zscore-alpha: 0.6
repa-stop-step: 250000
repa-stop-fade-steps: 0

# ============================================================================
# Dataset (needs raw images for REPA)
# ============================================================================
data-dir: /dev/shm/data
resolution: 256
batch-size: 256

# ============================================================================
# Training
# ============================================================================
epochs: 1400
max-train-steps: 400000
checkpointing-steps: 5000
sampling-steps: 100000
gradient-accumulation-steps: 1
learning-rate: 1e-4
adam-beta1: 0.9
adam-beta2: 0.999
adam-weight-decay: 0.0
adam-epsilon: 1e-8
max-grad-norm: 1.0
ema-decay: 0.9999
ema-update-freq: 1

# ============================================================================
# Precision & Performance
# ============================================================================
allow-tf32: true
mixed-precision: fp16
compile: true

# ============================================================================
# Misc
# ============================================================================
seed: 0
num-workers: 12
cfg-prob: 0.1
path-type: linear
prediction: v
n-samples: 256